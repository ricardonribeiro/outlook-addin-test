<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Outlook Add-in Host</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 32rem;
        margin: 4rem auto;
        padding: 0 1.5rem;
        color: #242424;
        line-height: 1.5;
      }
      code { background: #f3f2f1; padding: 0.1rem 0.3rem; border-radius: 3px; }
      .muted { color: #605e5c; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Outlook Add-in Host</h1>
    <p>
      This site hosts the static assets for an Outlook add-in. It is not a
      standalone web app — there is no user-facing page here.
    </p>
    <p class="muted">
      The add-in is loaded by Outlook from <code>/commands.html</code> via its
      manifest. If you reached this page directly, that is expected.
    </p>
  </body>
</html>
